{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-start mb-3">
  <div>
    <h1 class="h3 mb-1">工程報告匯出</h1>
    <div class="text-muted">
      <a href="/projects/{{ project.id }}">{{ project.name }}</a>
      <span class="ms-2">Project #{{ project.id }}</span>
    </div>
  </div>
  <div class="d-flex flex-wrap gap-2 justify-content-end">
    <a class="btn btn-outline-secondary" href="/projects/{{ project.id }}">回專案</a>
    <a class="btn btn-primary" href="/projects/{{ project.id }}/engineering-report/export?format=markdown">下載 Markdown</a>
    <a class="btn btn-outline-primary" href="/projects/{{ project.id }}/engineering-report/export?format=html">下載 HTML</a>
  </div>
</div>

<div class="alert alert-info small">
  報告由 DevPilot 目前資料即時產生，不會寫入磁碟，不包含 API Token、API Key 或 .env 內容。
</div>

<div class="row g-3">
  <div class="col-xl-5">
    <div class="card shadow-sm h-100">
      <div class="card-header fw-bold">Markdown Preview</div>
      <div class="card-body">
        <pre class="small bg-light border rounded p-3 mb-0 text-wrap" style="max-height: 72vh; overflow:auto;">{{ markdown }}</pre>
      </div>
    </div>
  </div>
  <div class="col-xl-7">
    <div class="card shadow-sm h-100">
      <div class="card-header fw-bold">HTML Preview</div>
      <div class="card-body p-0">
        <iframe title="Engineering report HTML preview" class="w-100 border-0" style="min-height: 72vh;" srcdoc="{{ html_report|e }}"></iframe>
      </div>
    </div>
  </div>
</div>
{% endblock %}
