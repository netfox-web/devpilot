<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">🚀 {{ app_name }}</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsExample07"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="navbarsExample07">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="/">儀表板</a></li>
        <li class="nav-item"><a class="nav-link" href="/projects">專案列表</a></li>
        <li class="nav-item"><a class="nav-link" href="/projects/new">新增專案</a></li>
        <li class="nav-item"><a class="nav-link" href="/deployment-targets">部署主機</a></li>
        <li class="nav-item"><a class="nav-link" href="/deployment-board">部署看板</a></li>
      </ul>
      <span class="navbar-text small">Codex / Claude / Cursor 交接中控台</span>
    </div>
  </div>
</nav>
<main class="container-fluid py-4">
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for message in messages %}<div class="alert alert-success">{{ message }}</div>{% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
