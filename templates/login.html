<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_name }} Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <main class="container py-5" style="max-width: 460px;">
    <div class="card shadow-sm">
      <div class="card-header fw-bold">DevPilot Login</div>
      <div class="card-body">
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}<div class="alert alert-warning">{{ message }}</div>{% endfor %}
          {% endif %}
        {% endwith %}
        <form method="post">
          <label class="form-label">Username</label>
          <input class="form-control mb-3" name="username" autocomplete="username" required>
          <label class="form-label">Password</label>
          <input class="form-control mb-3" name="password" type="password" autocomplete="current-password" required>
          <button class="btn btn-primary w-100">Login</button>
        </form>
        <div class="small text-muted mt-3">Initial owner is created at startup. Default username is <code>owner</code>; password comes from <code>DEV_PILOT_OWNER_PASSWORD</code> or API_TOKEN.</div>
      </div>
    </div>
  </main>
</body>
</html>
