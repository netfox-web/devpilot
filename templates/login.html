<!doctype html>
<html lang="{{ ui_lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_name }} {{ ui_t("Login") }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <main class="container py-5" style="max-width: 460px;">
    <div class="card shadow-sm">
      <div class="card-header fw-bold">DevPilot Login</div>
      <div class="card-body">
        <div class="d-flex justify-content-end mb-3">
          <div class="btn-group btn-group-sm" role="group" aria-label="{{ ui_t('Language') }}">
            {% for lang_code, lang_label in ui_languages.items() %}
              <a class="btn btn-outline-secondary {% if lang_code == ui_lang %}active{% endif %}" href="{{ ui_language_switch_url(lang_code) }}">{{ lang_label }}</a>
            {% endfor %}
          </div>
        </div>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}<div class="alert alert-warning">{{ message }}</div>{% endfor %}
          {% endif %}
        {% endwith %}
        <form method="post">
          <label class="form-label">{{ ui_t("Username") }}</label>
          <input class="form-control mb-3" name="username" autocomplete="username" required>
          <label class="form-label">{{ ui_t("Password") }}</label>
          <input class="form-control mb-3" name="password" type="password" autocomplete="current-password" required>
          <button class="btn btn-primary w-100">{{ ui_t("Login") }}</button>
        </form>
        <div class="small text-muted mt-3">{{ ui_t("Use your administrator credentials.") }}</div>
      </div>
    </div>
  </main>
  <script>
    window.DEVPILOT_UI_I18N = {
      lang: {{ ui_lang|tojson }},
      catalog: {{ ui_i18n_catalog|tojson }}
    };
    (function () {
      const catalog = (window.DEVPILOT_UI_I18N && window.DEVPILOT_UI_I18N.catalog) || {};
      const translateExact = (value) => {
        const raw = String(value || '');
        const trimmed = raw.trim();
        if (!trimmed || !Object.prototype.hasOwnProperty.call(catalog, trimmed)) return raw;
        return raw.replace(trimmed, catalog[trimmed]);
      };
      document.title = translateExact(document.title);
      document.querySelectorAll('[placeholder], [title], [aria-label]').forEach((node) => {
        ['placeholder', 'title', 'aria-label'].forEach((attr) => {
          if (node.hasAttribute(attr)) node.setAttribute(attr, translateExact(node.getAttribute(attr)));
        });
      });
    })();
  </script>
</body>
</html>
